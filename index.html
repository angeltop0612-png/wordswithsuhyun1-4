      { id: 34, word: "dig", meaning: "파다, 캐내다", prefix: "diki- (도랑을 쪼개다)", root: "dic (고대 영어: 도구를 써서 흙을 파내어 도랑을 만드는 행위)", story: "삽이나 손가락 끝에 강한 힘을 주어 흙벽을 무너뜨려 구멍을 만들거나, 묻혀 있는 식물의 소중한 뿌리나 보물을 바깥으로 꺼내는 모션입니다.", related: "ditch (도랑, 수로), dike (제방, 둑)" },
      { id: 35, word: "grow", meaning: "재배하다, 기르다; 자라다", prefix: "ghre- (초록색으로 파릇하게 변하다)", root: "growan (고대 영어: 식물이 새싹을 틔워 부피를 키우다)", story: "봄철 햇살을 받아 죽어있던 땅에서 푸른 싹이 돋아나 세포를 불려 나가는 '자라다'에서, 사람이 농작물을 정성껏 '기르다'라는 타동사 의미까지 융합되었습니다.", related: "growth (성장), grass (풀), green (초록색)" },
      { id: 36, word: "plant", meaning: "식물; 심다", prefix: "plat- (평평한, 발바닥)", root: "planta (라틴어: 발바닥으로 흙을 꾹 밟아 고정한 새싹)", story: "고대인들이 땅을 파고 어린나무를 넣은 뒤 흙이 흔들리지 않도록 발바닥(plat)으로 주변을 꾹꾹 눌러 '심은 초목'에서 단어가 유래했습니다. 현재는 공장 설비라는 뜻으로도 쓰입니다.", related: "plantation (대농장), transplant (이식하다), plate (접시)" },
      { id: 37, word: "bean", meaning: "콩", prefix: "bha- (통통하게 부풀다)", root: "bean (고대 영어: 껍질 속에 영양이 들어찬 둥근 씨앗)", story: "길쭉한 식물 주머니(꼬투리) 속에서 동글동글하게 살이 통통히 올라 영양 성분을 가득 응축해 놓은 곡물인 '콩'을 뜻합니다.", related: "beanstalk (콩나무 줄기), jellybean (젤리빈)" },
      { id: 38, word: "vegetable", meaning: "채소", prefix: "veg- (생기 넘치는, 활력이 도는)", root: "vegetabilis (라틴어: 식물이 푸르게 살아 움직이듯 무럭무럭 자람)", story: "대지에서 수분과 에너지를 흡수하여 아주 싱싱하고 생기 넘치게(vigorous) 자라나 인간에게 푸른 영양을 전해주는 '채소'를 의미합니다.", related: "vegetation (초목, 식생), vegetarian (채식주의자), vigor (활력)" },
      { id: 39, word: "right away", meaning: "즉시, 곧바로", prefix: "right (올바른, 일직선의) + away (저 멀리로 출발하여)", root: "고대 영어 기반 부사구의 구조적 융합", story: "좌우로 길을 잘못 들어 비뚤어지거나 중간에 지체하는 굽은 선 없이, 목적지를 향해 자를 대고 그은 듯 일직선(right)으로 즉시 튀어 나가는 신속함의 비유입니다.", related: "right (오른쪽, 올바른), away (떨어져서)" },
      { id: 40, word: "pick up", meaning: "~을 집다; ~을 (차에) 태우러 가다", prefix: "pick (바늘로 찌르다, 콕 집다) + up (위쪽 방향으로)", root: "중세 게르만어 계통 숙어 조합", story: "바닥에 조그맣게 떨어져 있는 사물을 손가락 끝으로 정확히 콕 집어서(pick) 위로(up) 가볍게 들어 올린다는 기본 뜻에서, 사람을 차에 태우다까지 번졌습니다.", related: "pick (선택하다, 고르다), pickup truck (픽업트럭)" }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState("list"); // list 또는 card
      const [currentIndex, setCurrentIndex] = useState(0);
      const [searchQuery, setSearchQuery] = useState("");
      const [bookmarked, setBookmarked] = useState(new Set());
      const [memorized, setMemorized] = useState(new Set());
      const [showMeaning, setShowMeaning] = useState(true);
      const [filterMode, setFilterMode] = useState("all");
      const [isPlaying, setIsPlaying] = useState(false);
      const [speechRate, setSpeechRate] = useState(0.9);
      const autoPlayTimer = useRef(null);

      // 영어 발음 청취 TTS
      const playPronunciation = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const clean = text.replace(/\[.*?\]/g,'').replace(/\(.*?\)/g,'').trim();
          const u = new SpeechSynthesisUtterance(clean);
          u.lang = 'en-US'; u.rate = speechRate;
          window.speechSynthesis.speak(u);
        }
      };

      // 한국어 뜻 청취 TTS
      const playMeaning = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const clean = text.replace(/[\(\)·\[\]~;]/g,'');
          const u = new SpeechSynthesisUtterance(clean);
          u.lang = 'ko-KR'; u.rate = 1.0;
          window.speechSynthesis.speak(u);
        }
      };

      // 필터 및 검색 정밀 처리
      const filteredWords = useMemo(() => {
        return WORDS.filter(item => {
          const q = searchQuery.toLowerCase();
          const match = item.word.toLowerCase().includes(q) || 
                        item.meaning.includes(searchQuery) ||
                        (item.related && item.related.toLowerCase().includes(q)) ||
                        (item.root && item.root.toLowerCase().includes(q));
          if (!match) return false;
          if (filterMode === "bookmarked") return bookmarked.has(item.id);
          if (filterMode === "not_memorized") return !memorized.has(item.id);
          return true;
        });
      }, [searchQuery, filterMode, bookmarked, memorized]);

      const currentWord = filteredWords[currentIndex] || filteredWords[0] || null;

      const handleNext = () => {
        if (!filteredWords.length) return;
        setCurrentIndex(p => (p + 1) % filteredWords.length);
        setShowMeaning(true);
      };

      const handlePrev = () => {
        if (!filteredWords.length) return;
        setCurrentIndex(p => (p - 1 + filteredWords.length) % filteredWords.length);
        setShowMeaning(true);
      };

      useEffect(() => {
        setCurrentIndex(0); setShowMeaning(true);
      }, [filterMode, searchQuery]);

      // 데스크톱 호환 하드웨어 키보드 바인딩
      useEffect(() => {
        const handler = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
          if (e.key === 'ArrowRight') handleNext();
          else if (e.key === 'ArrowLeft') handlePrev();
          else if (e.key === ' ') { e.preventDefault(); setShowMeaning(p => !p); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [currentIndex, filteredWords]);

      // 자동 스트리밍 모드 루프
      useEffect(() => {
        if (isPlaying && currentWord) {
          playPronunciation(currentWord.word);
          autoPlayTimer.current = setTimeout(() => {
            if (showMeaning) playMeaning(currentWord.meaning);
            autoPlayTimer.current = setTimeout(handleNext, 4300);
          }, 1800);
        }
        return () => clearTimeout(autoPlayTimer.current);
      }, [isPlaying, currentIndex, currentWord, showMeaning]);

      const toggleBookmark = (id) => setBookmarked(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
      const toggleMemorized = (id) => setMemorized(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });

      return (
        <div class="h-screen flex flex-col bg-[#02130d] text-slate-200 select-none overflow-hidden">
          
          {/* TOP HEADER */}
          <div class="relative bg-[#021f14] px-4 pt-4 pb-3 border-b border-emerald-900/40 flex-shrink-0">
            <div class="absolute inset-x-0 top-0 h-1 stripe-emerald"></div>
            <div class="flex items-center justify-between">
              <div>
                <div class="flex items-center gap-1.5">
                  <span class="px-1.5 py-0.5 bg-emerald-600 text-white font-black text-[9px] rounded mono tracking-wider">ZEBRA</span>
                  <span class="text-[10px] text-emerald-400 font-bold mono">중등 BASIC [33-34과]</span>
                </div>
                <h1 class="text-sm font-bold text-white mt-0.5">워마 건강·자연 어원 단어장</h1>
              </div>
              <div class="text-right">
                <span class="text-[10px] text-emerald-600 block mono font-semibold">암기율</span>
                <span class="text-xs font-bold text-emerald-400 mono">{memorized.size} <span class="text-[10px] text-emerald-700">/ {WORDS.length}</span></span>
              </div>
            </div>

            {/* PROGRESS BAR */}
            <div class="w-full h-1 bg-[#01140d] rounded-full mt-3 overflow-hidden">
              <div class="h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full transition-all duration-300"
                style={{ width: `${(memorized.size / WORDS.length) * 100}%` }}></div>
            </div>
          </div>

          {/* MAIN CONTENTS CONTAINER */}
          <div class="flex-1 overflow-hidden relative bg-[#02130d]">
            
            {/* 1. LIST VIEW TAB */}
            {activeTab === "list" && (
              <div class="h-full flex flex-col fade-in">
                {/* Filters */}
                <div class="p-2 bg-[#021f14] border-b border-emerald-950 grid grid-cols-3 gap-1">
                  {[["all","전체","text-slate-300"],["bookmarked","★ 북마크","text-amber-400"],["not_memorized","미암기","text-emerald-400"]].map(([mode, label, color]) => (
                    <button key={mode} onClick={() => setFilterMode(mode)}
                      class={`py-1.5 text-xs rounded-lg font-medium transition-all ${filterMode === mode ? "bg-emerald-950/60 border border-emerald-600/40 " + color : "text-slate-500 hover:bg-[#032014]"}`}>
                      {label}
                    </button>
                  ))}
                </div>

                {/* Search Bar */}
                <div class="p-2 bg-[#02130d] border-b border-slate-900 relative">
                  <input type="text" placeholder="단어·뜻·어근·동계어 스마트 검색..."
                    value={searchQuery}
                    onChange={e => setSearchQuery(e.target.value)}
                    class="w-full pl-8 pr-3 py-1.5 bg-[#032014] border border-emerald-950 rounded-lg text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 transition-colors"
                  />
                  <span class="absolute left-4 top-3.5 text-slate-600 text-xs">⌕</span>
                </div>

                {/* Word Scroll List */}
                <div class="flex-1 overflow-y-auto divide-y divide-emerald-950/40 pb-12">
                  {filteredWords.length === 0 ? (
                    <div class="p-12 text-center text-xs text-slate-600 mono">검색 조건에 맞는 단어가 없습니다.</div>
                  ) : filteredWords.map((item, idx) => {
                    const isM = memorized.has(item.id);
                    const isB = bookmarked.has(item.id);
                    return (
                      <div key={item.id}
                        onClick={() => { setCurrentIndex(idx); setShowMeaning(true); setActiveTab("card"); }}
                        class="p-3.5 cursor-pointer flex items-center justify-between bg-[#02130d] hover:bg-[#031d13] active:bg-[#031d13] transition-colors">
                        <div class="min-w-0 pr-4">
                          <div class="flex items-center gap-1.5">
                            <span class="text-[10px] mono text-emerald-800">{item.id}.</span>
                            <span class={`font-bold text-sm tracking-tight ${isM ? "text-emerald-800 line-through decoration-emerald-900" : "text-slate-200"}`}>{item.word}</span>
                          </div>
                          <p class={`text-xs mt-1 truncate ${isM ? "text-emerald-900" : "text-slate-400"}`}>{item.meaning}</p>
                        </div>
                        <div class="flex gap-2" onClick={e => e.stopPropagation()}>
                          <button onClick={() => toggleBookmark(item.id)}
                            class={`p-2 text-sm transition-colors rounded-lg ${isB ? "text-amber-400 bg-amber-500/5" : "text-slate-700"}`}>★</button>
                          <button onClick={() => toggleMemorized(item.id)}
                            class={`p-2 text-sm transition-colors rounded-lg ${isM ? "text-emerald-400 bg-emerald-500/5" : "text-slate-700"}`}>✔</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* 2. CARD STUDY TAB (WITH SCROLLABLE ETYMO) */}
            {activeTab === "card" && (
              <div class="h-full flex flex-col p-4 justify-between overflow-y-auto pb-16 fade-in">
                
                {/* Card Settings Bar */}
                <div class="flex-shrink-0 flex items-center justify-between bg-[#021f14] border border-emerald-900/30 rounded-xl px-3 py-1.5 mb-3">
                  <div class="text-[11px] font-bold text-slate-500 mono">
                    CARD <span class="text-emerald-400">{currentIndex + 1}</span> / {filteredWords.length}
                  </div>
                  <div class="flex items-center gap-2">
                    <select value={speechRate} onChange={e => setSpeechRate(parseFloat(e.target.value))}
                      class="bg-[#032014] text-[10px] mono text-slate-400 rounded border border-emerald-950 px-1 py-0.5 focus:outline-none">
                      <option value="0.7">0.7x</option>
                      <option value="0.9">0.9x</option>
                      <option value="1.1">1.1x</option>
                    </select>
                    <button onClick={() => setIsPlaying(p => !p)}
                      class={`px-2.5 py-1 text-[10px] font-bold rounded-md transition-all ${isPlaying ? "bg-rose-600 text-white" : "bg-emerald-600 text-white"}`}>
                      {isPlaying ? "정지" : "▶ 자동"}
                    </button>
                  </div>
                </div>

                {/* Main Card View Space */}
                <div class="w-full flex flex-col gap-4 items-center justify-start flex-1">
                  {currentWord ? (
                    <React.Fragment>
                      
                      {/* Flip Card Unit */}
                      <div onClick={() => setShowMeaning(p => !p)} class="perspective-1000 w-full max-w-sm h-48 cursor-pointer relative flex-shrink-0">
                        <div class={`w-full h-full duration-300 preserve-3d transition-transform relative ${!showMeaning ? "rotate-y-180" : ""}`}>
                          
                          {/* CARD FRONT (ENGLISH WORD) */}
                          <div class="absolute w-full h-full bg-[#031d13] border border-emerald-900/40 rounded-2xl flex flex-col justify-between p-4 backface-hidden glow-emerald">
                            <div class="flex justify-between items-center w-full">
                              <span class="text-[9px] mono text-emerald-700 font-bold tracking-wider uppercase">ENGLISH WORD</span>
                              <button onClick={e => { e.stopPropagation(); toggleBookmark(currentWord.id); }}
                                class={`text-sm ${bookmarked.has(currentWord.id) ? "text-amber-400" : "text-slate-700"}`}>★</button>
                            </div>
                            <div class="text-center px-2">
                              <h2 class="text-3xl font-black text-white tracking-tight select-all">{currentWord.word}</h2>
                              <p class="text-[10px] text-slate-500 mt-1.5">화면을 탭하면 한국어 뜻 확인</p>
                            </div>
                            <div class="flex justify-center">
                              <button onClick={e => { e.stopPropagation(); playPronunciation(currentWord.word); }}
                                class="px-3 py-1 rounded-full bg-[#02130d] border border-emerald-900/40 text-emerald-400 text-[10px] font-medium active:scale-95 transition-transform">
                                🔊 발음 듣기
                              </button>
                            </div>
                          </div>

                          {/* CARD BACK (KOREAN MEANING) */}
                          <div class="absolute w-full h-full bg-[#021f14] border border-emerald-800 rounded-2xl flex flex-col justify-between p-4 backface-hidden rotate-y-180">
                            <div class="flex justify-between items-center w-full">
                              <span class="text-[9px] mono text-emerald-500 font-bold tracking-wider uppercase">MEANING</span>
                              <button onClick={e => { e.stopPropagation(); toggleMemorized(currentWord.id); }}
                                class={`text-xs px-2 py-0.5 rounded border ${memorized.has(currentWord.id) ? "border-emerald-500/40 bg-emerald-500/10 text-emerald-400" : "border-emerald-950 text-slate-500"}`}>
                                ✓ {memorized.has(currentWord.id) ? "외웠음" : "미암기"}
                              </button>
                            </div>
                            <div class="text-center px-1">
                              <p class="text-base font-bold text-emerald-300 leading-snug break-all">{currentWord.meaning}</p>
                              <button onClick={e => { e.stopPropagation(); playMeaning(currentWord.meaning); }}
                                class="text-[10px] text-slate-500 active:text-slate-300 mt-2 underline decoration-emerald-800">🔊 뜻 듣기</button>
                            </div>
                            <p class="text-center text-[9px] text-emerald-700">다시 탭하면 영단어가 노출됩니다</p>
                          </div>

                        </div>
                      </div>

                      {/* Mobile Optimized Etymology Info Display Card */}
                      <div class="w-full max-w-sm bg-[#021f14] border border-emerald-900/40 rounded-xl p-4 text-left glow-emerald">
                        <div class="flex items-center gap-1.5 mb-2.5">
                          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                          <span class="text-[9px] uppercase mono font-black tracking-widest text-emerald-400">어원 입체 학습 분석기</span>
                        </div>
                        
                        <div class="space-y-3">
                          {/* Prefix & Root Badges */}
                          <div class="flex flex-wrap gap-1 text-[10px] font-medium">
                            <span class="px-2 py-0.5 bg-[#032014] rounded-md text-slate-300 border border-emerald-950 mono">
                              형태: <b class="text-emerald-400 font-semibold">{currentWord.prefix || "기본형"}</b>
                            </span>
                            {currentWord.root && (
                              <span class="px-2 py-0.5 bg-[#032014] rounded-md text-slate-300 border border-emerald-950 mono">
                                어근: <b class="text-teal-400 font-semibold">{currentWord.root}</b>
                              </span>
                            )}
                          </div>

                          {/* Story Narrative */}
                          <p class="text-slate-300 text-xs leading-relaxed font-normal bg-[#02130d]/50 p-2 rounded-lg border border-emerald-950/40">
                            {currentWord.story}
                          </p>

                          {/* Cognates Block */}
                          {currentWord.related && (
                            <div class="pt-2 border-t border-emerald-950">
                              <span class="text-[9px] font-bold text-amber-400 uppercase tracking-wider mono block mb-1">어근 공유 동계어 묶음 (Cognates)</span>
                              <div class="text-[11px] text-slate-400 mono leading-relaxed bg-[#032014] p-2 rounded-lg border border-emerald-950">
                                {currentWord.related}
                              </div>
                            </div>
                          )}
                        </div>
                      </div>

                    </React.Fragment>
                  ) : (
                    <div class="text-center p-6 bg-[#021f14] border border-emerald-900/40 rounded-xl w-full max-w-xs">
                      <p class="text-slate-500 text-xs mb-2">선택된 단어가 없습니다.</p>
                      <button onClick={() => { setFilterMode("all"); setSearchQuery(""); }}
                        class="text-xs text-emerald-400 font-bold underline">필터 초기화</button>
                    </div>
                  )}
                </div>

                {/* Card Navigation Controls */}
                <div class="flex items-center justify-between gap-3 w-full max-w-sm mx-auto mt-4">
                  <button onClick={handlePrev} disabled={filteredWords.length <= 1}
                    class="flex-1 py-2.5 rounded-xl bg-[#032014] border border-emerald-950 hover:border-emerald-700 active:scale-95 text-slate-300 text-xs font-bold transition-all disabled:opacity-20">
                    이전 단어
                  </button>
                  <button onClick={handleNext} disabled={filteredWords.length <= 1}
                    class="flex-1 py-2.5 rounded-xl bg-emerald-600 active:scale-95 text-white text-xs font-bold transition-all disabled:opacity-20 shadow-lg shadow-emerald-600/10">
                    다음 단어
                  </button>
                </div>
              </div>
            )}

          </div>

          {/* BOTTOM GLOBAL MOBILE TAB BAR */}
          <div class="flex-shrink-0 bg-[#021f14] border-t border-emerald-950 flex justify-around pb-safe z-50">
            <button onClick={() => { setActiveTab("list"); setIsPlaying(false); }}
              class={`flex-1 py-3 flex flex-col items-center justify-center gap-0.5 transition-colors ${activeTab === "list" ? "text-emerald-400 bg-emerald-950/20 font-bold" : "text-slate-500"}`}>
              <span class="text-base">📋</span>
              <span class="text-[10px]">단어 목록</span>
            </button>
            <button onClick={() => { setActiveTab("card"); setShowMeaning(true); }}
              class={`flex-1 py-3 flex flex-col items-center justify-center gap-0.5 transition-colors ${activeTab === "card" ? "text-emerald-400 bg-emerald-950/20 font-bold" : "text-slate-500"}`}>
              <span class="text-base">🃏</span>
              <span class="text-[10px]">카드 학습</span>
            </button>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
