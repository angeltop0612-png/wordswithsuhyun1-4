<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>얼룩말영어학원 베이직 단어장</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.5s; transform-style: preserve-3d; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white shadow-xl flex flex-col justify-between min-h-screen border-x border-slate-200">
        
        <header class="bg-indigo-600 text-white p-4 text-center shadow-md">
            <h1 class="text-xl font-bold tracking-wide">🦓 얼룩말영어학원</h1>
            <p class="text-xs text-indigo-200 mt-1 font-medium">워마 중등 BASIC 35 - 36 단어장 (어원·동계어)</p>
        </header>

        <main class="flex-1 p-4 overflow-y-auto">
            
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="switchDay(35)" id="tab-35" class="tab-btn bg-indigo-600 text-white font-semibold py-2 rounded-lg text-sm transition shadow-sm">Day 35 (20)</button>
                <button onclick="switchDay(36)" id="tab-36" class="tab-btn bg-slate-100 text-slate-600 font-semibold py-2 rounded-lg text-sm transition">Day 36 (20)</button>
            </div>

            <div class="flex justify-end gap-2 mb-4 text-xs font-medium">
                <button onclick="switchMode('list')" id="mode-list" class="px-3 py-1.5 rounded-full bg-slate-800 text-white shadow">목록 보기</button>
                <button onclick="switchMode('card')" id="mode-card" class="px-3 py-1.5 rounded-full bg-slate-200 text-slate-700">카드 학습</button>
            </div>

            <div id="vocab-container" class="space-y-3"></div>

        </main>

        <footer class="bg-slate-50 border-t border-slate-200 p-3 text-center text-xs text-slate-400" id="app-footer">
            © 얼룩말영어학원 | 스마트 단어 학습 시스템
        </footer>
    </div>

    <script>
        const vocabData = {
            35: [
                { word: "bee", meaning: "벌", etymology: "고대 영어 bēo에서 유래. 부지런히 꿀을 모으고 군집을 이루어 사회성 생활을 하는 대표적인 곤충.", cognates: "beehive (벌집), beeswax (밀랍)" },
                { word: "snake", meaning: "뱀", etymology: "고대 영어 snaca(기어 다니는 것)에서 유래. 다리가 없고 몸이 가늘고 긴 파충류 동물의 총칭.", cognates: "snaky (뱀 같은, 구불구불한)" },
                { word: "hunt", meaning: "사냥하다", etymology: "고대 영어 huntian(추적하여 잡다)에서 유래. 야생 동물을 쫓아가 포획하거나 죽이는 행위.", cognates: "hunter (사냥꾼), hunting (사냥)" },
                { word: "wild", meaning: "야생의", etymology: "고대 영어 wilde(인간에게 길들여지지 않은)에서 유래. 자연 그대로 자라며 통제되지 않은 상태.", cognates: "wilderness (황야, 광야)" },
                { word: "fly", meaning: "파리: 날다", etymology: "고대 영어 flēogan(날개를 치며 공중을 이동하다)에서 유래. 해충인 파리(명사)와 날다(동사)의 뜻을 가짐.", cognates: "flight (비행, 항공편)" },
                { word: "elephant", meaning: "코끼리", etymology: "그리스어 elephas(상아, 코끼리)에서 유래. 현존하는 육상 동물 중 가장 거대한 코와 상아를 가진 포유류.", cognates: "elephantine (코끼리 같은, 거대한)" },
                { word: "mouse", meaning: "쥐. 생쥐", etymology: "라틴어 mūs에서 유래. 몸집이 작고 앞니가 날카로워 무엇이든 갉아먹는 설치류 동물의 총칭.", cognates: "mice (mouse의 복수형)" },
                { word: "feed", meaning: "먹이를 주다", etymology: "고대 영어 fēdan(음식을 대주다)에서 유래. 사람이나 동물에게 영양분을 섭취하도록 식량을 제공하는 행위.", cognates: "food (음식), feeder (급여 장치)" },
                { word: "giraffe", meaning: "기린", etymology: "아랍어 zarāfa(목이 긴 동물)에서 이탈리아어와 프랑스어를 거쳐 유래함.", cognates: "giraffish (기린 같은)" },
                { word: "animal", meaning: "동물", etymology: "라틴어 animālis(숨을 쉬는 것, 생명이 있는 것)에서 유래. 식물과 달리 스스로 움직이는 생물체.", cognates: "animate (생기를 불어넣다), animation (만화영화, 활기)" },
                { word: "chicken", meaning: "닭", etymology: "고대 영어 cicen(새끼 조류 가축)에서 유래. 가축으로 널리 기르는 꿩과의 새.", cognates: "chick (병아리)" },
                { word: "zebra", meaning: "얼룩말", etymology: "아프리카 지역 언어에서 유래하여 포르투갈어를 거쳐 정착됨. 몸 전체에 검고 흰 줄무늬가 있는 말속 동물.", cognates: "zebra crossing (횡단보도)" },
                { word: "look for", meaning: "을 찾다", etymology: "look(시선을 두다) + 전치사 for(목표 대상). 필요한 대상을 찾아내기 위해 눈을 돌리며 수색하는 행위.", cognates: "look (보다)" },
                { word: "tail", meaning: "꼬리", etymology: "고대 영어 tægel(동물의 뒷부분)에서 유래. 척추동물의 몸통 끝에 길게 뻗어 돌출된 부분.", cognates: "tailless (꼬리가 없는)" },
                { word: "monkey", meaning: "원숭이", etymology: "저지 독일어 moneke(작은 사람 모습을 닮은 것)에서 유래. 영장류 중 유인원을 제외한 동물의 총칭.", cognates: "monkeyish (원숭이 같은)" },
                { word: "sheep", meaning: "양", etymology: "고대 영어 scēap에서 유래. 온순하며 털과 고기를 얻기 위해 무리 지어 기르는 초식성 가축.", cognates: "shepherd (양치기)" },
                { word: "whale", meaning: "고래", etymology: "고대 영어 hwæl(거대한 바다 동물)에서 유래. 물속에 살며 아가미가 아닌 폐로 숨을 쉬는 대형 포유류.", cognates: "whaler (포경선)" },
                { word: "colorful", meaning: "알록달록한, 다채로운", etymology: "color(색) + full(~이 가득 찬). 단조롭지 않고 여러 가지 화려하고 밝은 색깔들이 많이 들어간 상태.", cognates: "color (색상), colorless (무색의)" },
                { word: "wolf", meaning: "늑대", etymology: "고대 영어 wulf에서 유래. 개과에 속하며 주로 야생에서 무리를 지어 조직적으로 사냥하는 육식 동물.", cognates: "wolfish (늑대 같은, 탐욕스러운)" },
                { word: "by the way", meaning: "그런데, 그나저나", etymology: "by(~의 옆에) + the way(가던 길). 이야기의 주된 본문 흐름 옆으로 비껴나 새로운 화제를 유도할 때 쓰는 표현.", cognates: "way (길, 방법)" }
            ],
            36: [
                { word: "desert", meaning: "사막", etymology: "라틴어 dēsertus(사람이 살지 않고 버려진 땅)에서 유래. 비가 거의 오지 않아 모래와 바위만 가득한 황량한 지역.", cognates: "deserted (폐허가 된, 버려진)" },
                { word: "valley", meaning: "계곡, 골짜기", etymology: "라틴어 vallis(산과 산 사이에 움푹 들어간 평지)에서 유래. 두 높은 지형 사이에 물이 흐르는 낮은 골짜기.", cognates: "vale (골짜기)" },
                { word: "take turns", meaning: "교대로 하다", etymology: "take(취하다) + turns(회전, 차례). 한 사람씩 자신의 차례에 맞춰 번갈아 가며 행동을 임무를 수행하는 양상.", cognates: "turn (돌다, 차례)" },
                { word: "wave", meaning: "파도, 물결: 흔들다", etymology: "고대 영어 wafian(물결치듯 손을 움직이다)에서 유래. 바다의 일렁이는 물결 또는 손을 위아래로 흔드는 행위.", cognates: "wavy (물결모양의)" },
                { word: "mystery", meaning: "미스터리, 불가사의", etymology: "그리스어 mystērion(비밀스러운 종교 의식)에서 유래. 인간의 이성이나 현재 지식으로 온전히 설명할 수 없는 신비.", cognates: "mysterious (신비로운, 의문투성이의)" },
                { word: "ocean", meaning: "대양, 바다", etymology: "그리스 신화 속 대륙 전체를 강처럼 둥글게 감싸고 흐르는 거대한 바다의 신 '오케아노스(Okeanos)'에서 유래.", cognates: "oceanic (대양의, 해양의)" },
                { word: "pond", meaning: "연못", etymology: "중세 영어 pound(물이 가두어진 구역)에서 유래. 담수어가 살 수 있도록 둑을 쌓아 물을 모아놓은 아담한 물웅덩이.", cognates: "pound (가두다, 파운드)" },
                { word: "cave", meaning: "동굴", etymology: "라틴어 cavus(속이 텅 비어 있는 공간)에서 유래. 암벽이나 땅속에 자연적으로 깊게 파여 만들어진 큰 구멍.", cognates: "cavity (구멍, 충치)" },
                { word: "look at", meaning: "~을 보다", etymology: "look(시선을 던지다) + 전치사 at(특정한 한 초점 점). 눈동자를 특정 대상을 향해 고정하고 집중해서 관찰하는 행위.", cognates: "look (보다)" },
                { word: "nature", meaning: "자연", etymology: "라틴어 nātūra(사물의 타고난 고유한 본질, 탄생)에서 유래. 인간의 손길이 가해지지 않은 지구상의 모든 환경.", cognates: "natural (자연스러운, 천연의), naturally (물론, 자연스럽게)" },
                { word: "polar", meaning: "북극 [남극]의", etymology: "라틴어 polus(지구 자전축의 양 끝점, 극지)에서 유래. 기온이 매우 낮은 지구의 가장 북쪽이나 남쪽 극지방의.", cognates: "pole (극, 막대기), polar bear (북극곰)" },
                { word: "river", meaning: "강", etymology: "라틴어 rīpa(강둑, 물가)에서 유래. 일정한 물줄기를 이루어 높은 곳에서 낮은 바다나 호수로 끊임없이 흐르는 지형.", cognates: "riverbank (강둑)" },
                { word: "land", meaning: "육지, 땅", etymology: "고대 영어 land(바다 영역과 구분되는 단단한 표면)에서 유래. 사람이 딛고 서거나 농사를 지을 수 있는 흙 바닥.", cognates: "landmark (주요 지형물, 랜드마크)" },
                { word: "hill", meaning: "언덕", etymology: "고대 영어 hyll(솟아오른 곳)에서 유래. 산보다는 경사가 완만하고 규모가 작아 쉽게 오르내릴 수 있는 고지.", cognates: "hilly (언덕이 많은)" },
                { word: "forest", meaning: "숲", etymology: "라틴어 foris(문 밖의 영역, 야생의 땅)에서 유래. 나무와 풀이 무성하게 빽빽이 들어찬 거대한 수림 지대.", cognates: "forestry (산림학)" },
                { word: "island", meaning: "섬", etymology: "고대 영어 īegland(사방이 물로 둘러싸인 땅)에서 유래. 대륙보다는 작으나 사면이 바다나 호수로 막힌 육지 지형.", cognates: "islander (섬 주민)" },
                { word: "discover", meaning: "발견하다", etymology: "dis-(덮개를 떼어내다) + cover(덮다). 기존에 이미 존재하고 있었으나 가려져 몰랐던 대상을 처음으로 찾아내다.", cognates: "discovery (발견)" },
                { word: "mountain", meaning: "산", etymology: "라틴어 mōns(높이 솟아오른 것)에서 유래. 평지보다 훨씬 더 높이 험준한 경사를 이루며 하늘 향해 솟은 지형.", cognates: "mount (산, 오르다), mountainous (산악 지대의)" },
                { word: "jungle", meaning: "밀림, 정글", etymology: "산스크리트어 jaṅgala(거친 야생의 숲)에서 유래. 열대 기후 지역에서 수많은 덩굴과 거대 나무가 뒤엉킨 빽빽한 밀림.", cognates: "jungly (정글 같은)" },
                { word: "lake", meaning: "호수", etymology: "라틴어 lacus(물이 고인 거대한 분지 지형)에서 유래. 사방이 육지로 꽉 둘러싸여 넓게 고여 있는 담수 구역.", cognates: "lagoon (석호)" }
            ]
        };

        let currentDay = 35;
        let currentMode = 'list';
        let cardIndex = 0;

        function switchDay(day) {
            currentDay = day;
            cardIndex = 0; 
            
            const cardInner = document.getElementById('card-inner');
            if (cardInner) cardInner.classList.remove('card-flipped');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            const activeTab = document.getElementById(`tab-${day}`);
            activeTab.classList.remove('bg-slate-100', 'text-slate-600');
            activeTab.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');

            renderContent();
        }

        function switchMode(mode) {
            currentMode = mode;
            cardIndex = 0; 
            const listBtn = document.getElementById('mode-list');
            const cardBtn = document.getElementById('mode-card');

            if(mode === 'list') {
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            } else {
                cardBtn.className = "px-3 py-1.5 rounded-full bg-slate-800 text-white shadow";
                listBtn.className = "px-3 py-1.5 rounded-full bg-slate-200 text-slate-700";
            }
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('vocab-container');
            const footer = document.getElementById('app-footer');
            const data = vocabData[currentDay];

            if (currentMode === 'list') {
                footer.innerHTML = `© 얼룩말영어학원 | 스마트 단어 학습 시스템`;
                container.innerHTML = data.map((item, idx) => `
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="text-xs text-indigo-500 font-bold uppercase tracking-wider">No. ${idx + 1}</span>
                            <span class="text-xl font-bold text-slate-800">${item.word}</span>
                        </div>
                        <div class="mt-2 text-sm font-medium text-slate-600 border-t border-slate-200/60 pt-2">
                            <span class="text-indigo-600">뜻:</span> ${item.meaning}
                        </div>
                        <div class="mt-2 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-amber-600">💡 어원:</strong> ${item.etymology}
                        </div>
                        <div class="mt-1 text-xs text-slate-500 bg-white p-2 rounded border border-slate-100">
                            <strong class="text-emerald-600">🌿 동계어:</strong> ${item.cognates}
                        </div>
                    </div>
                `).join('');
            } else {
                const item = data[cardIndex];
                footer.innerHTML = `
                    <div class="flex justify-between items-center px-4 py-1">
                        <button onclick="prevCard()" class="px-4 py-2 bg-slate-200 text-slate-700 font-bold rounded-lg ${cardIndex === 0 ? 'opacity-50 pointer-events-none' : ''}">이전</button>
                        <span class="font-semibold text-slate-600">${cardIndex + 1} / ${data.length}</span>
                        <button onclick="nextCard()" class="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg ${cardIndex === data.length - 1 ? 'opacity-50 pointer-events-none' : ''}">다음</button>
                    </div>
                `;
                
                container.innerHTML = `
                    <div class="text-center text-xs text-slate-400 mb-2">💡 카드를 터치하면 뜻과 어원이 나타납니다.</div>
                    <div class="card-flip w-full h-80 cursor-pointer" onclick="flipCard()">
                        <div id="card-inner" class="card-inner w-full h-full relative rounded-2xl shadow-lg border border-slate-200">
                            <div class="card-front absolute w-full h-full bg-indigo-50 flex flex-col justify-center items-center rounded-2xl p-6">
                                <span class="text-xs text-indigo-400 font-bold tracking-widest mb-4">WORD</span>
                                <h2 class="text-4xl font-extrabold text-indigo-700 tracking-tight">${item.word}</h2>
                            </div>
                            <div class="card-back absolute w-full h-full bg-white flex flex-col justify-between rounded-2xl p-6 overflow-y-auto">
                                <div>
                                    <span class="text-xs text-emerald-500 font-bold tracking-widest block mb-2">MEANING</span>
                                    <h3 class="text-xl font-bold text-slate-800 border-b pb-2 border-slate-100">${item.meaning}</h3>
                                </div>
                                <div class="my-3 text-left space-y-2">
                                    <p class="text-xs text-slate-600"><strong class="text-amber-600 block mb-0.5">💡 어원</strong> ${item.etymology}</p>
                                    <p class="text-xs text-slate-600"><strong class="text-emerald-600 block mb-0.5">🌿 동계어</strong> ${item.cognates}</p>
                                </div>
                                <span class="text-[10px] text-slate-300">다시 터치하면 앞면으로 돌아갑니다.</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('card-flipped');
        }

        function nextCard() {
            if (cardIndex < vocabData[currentDay].length - 1) {
                cardIndex++;
                renderContent();
            }
        }

        function prevCard() {
            if (cardIndex > 0) {
                cardIndex--;
                renderContent();
            }
        }

        // Initialize with Day 35
        switchDay(35);
    </script>
</body>
</html>
